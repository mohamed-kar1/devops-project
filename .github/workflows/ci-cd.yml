name: CI/CD Pipeline - DevOps Project

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: devops-api
  REGISTRY: docker.io

jobs:
  # ===== ÉTAPE 1 : TESTS =====
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          cd app
          pip install -r requirements.txt

      - name: Lancer les tests pytest
        run: |
          cd app
          pytest test_app.py -v --tb=short

  # ===== ÉTAPE 2 : BUILD DOCKER =====
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ===== ÉTAPE 3 : DÉPLOIEMENT K8S =====
  deploy:
    name: Déploiement Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer kubectl
        uses: azure/setup-kubectl@v3

      - name: Configurer kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Mettre à jour l'image dans le déploiement
        run: |
          kubectl set image deployment/devops-api \
            devops-api=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n default

      - name: Attendre le déploiement
        run: kubectl rollout status deployment/devops-api -n default --timeout=120s

      - name: Vérifier les pods
        run: kubectl get pods -n default
